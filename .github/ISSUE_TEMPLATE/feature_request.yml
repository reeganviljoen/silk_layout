name: Feature request
description: Request CSS, HTML, layout, or rendering support.
title: "[feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What document or workflow should SilkLayout support?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example HTML/CSS
      description: Include a small representative example if possible.
      render: html
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - HTML parsing
        - CSS parsing/cascade
        - Block layout
        - Inline layout
        - Flex layout
        - Grid layout
        - PDF rendering
        - Documentation
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Links to specs, screenshots, or reference behavior.
