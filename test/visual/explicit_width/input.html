<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @page {
        size: 800px 1000px;
        margin: 0;
      }

      html, body {
        width: 800px;
        height: 1000px;
        margin: 0;
        padding: 0;
        font-family: Helvetica;
        font-size: 16px;
        line-height: 1.2;
      }

      * {
        margin: 0;
        padding: 0;
      }

      /* Explicit layout root */
      .container {
        width: 400px;
        border-width: 2px;
        border-color: black;
        padding: 20px;
        display: block;
      }

      p {
        display: block;
        margin-bottom: 10px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p>First paragraph</p>
      <p>Second paragraph</p>
    </div>
  </body>
</html>
