<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      @page {
        size: 800px 1000px;
        margin: 0;
      }

      html,
      body {
        width: 800px;
        height: 1000px;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 16px;
        margin: 0;
        padding: 0;
      }

      .row {
        display: flex;
        width: 360px;
        height: 90px;
        padding: 10px;
        border: 4px solid black;
        gap: 20px;
        align-items: center;
      }

      .item {
        width: 80px;
        height: 40px;
        border: 2px solid blue;
        background: lightblue;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="item">One</div>
      <div class="item">Two</div>
      <div class="item">Three</div>
    </div>
  </body>
</html>
