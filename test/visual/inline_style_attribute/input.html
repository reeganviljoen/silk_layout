<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @page {
        size: 800px 1000px;
        margin: 0;
      }

      html, body {
        width: 800px;
        height: 1000px;
        margin: 0;
        padding: 0;
        font-family: Helvetica;
        font-size: 16px;
        line-height: 1.2;
      }

      * {
        margin: 0;
        padding: 0;
      }

      .card {
        display: block;
        width: 360px;
        padding: 16px;
        border-style: solid;
        border-width: 6px;
        border-color: red;
      }

      p {
        display: block;
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <div class="card" style="border-color: blue">
      <p>Inline style wins</p>
    </div>
  </body>
</html>
