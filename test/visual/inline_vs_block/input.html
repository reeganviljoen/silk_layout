<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @page {
        size: 800px 1000px;
        margin: 0;
      }

      html, body {
        width: 800px;
        height: 1000px;
        margin: 0;
        padding: 0;
        font-family: Helvetica;
        font-size: 16px;
        line-height: 1.2;
      }

      * {
        margin: 0;
        padding: 0;
      }

      div {
        padding: 20px;
        border-width: 2px;
      }

      p {
        display: block;
        margin-bottom: 10px;
      }

      span {
        display: inline;
        font-size: 32px;
      }
    </style>
  </head>
  <body>
    <div>
      <p>A</p>
      <span>B</span>
    </div>
  </body>
</html>
