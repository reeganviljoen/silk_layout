<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @page {
        size: 800px 1000px;
        margin: 0;
      }

      html, body {
        width: 800px;
        height: 1000px;
        margin: 0;
        padding: 0;
        font-family: Helvetica;
        font-size: 16px;
        line-height: 1.2;
      }

      * {
        margin: 0;
        padding: 0;
      }

      .frame {
        display: block;
        width: 420px;
        padding: 20px;
        border-style: solid;
        border-width: 14px;
        border-top-color: red;
        border-right-color: green;
        border-bottom-color: blue;
        border-left-color: black;
      }

      p {
        display: block;
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <p>Border colors</p>
    </div>
  </body>
</html>
