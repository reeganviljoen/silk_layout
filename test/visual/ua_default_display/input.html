<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @page {
        size: 800px 1000px;
        margin: 0;
      }

      html, body {
        width: 800px;
        height: 1000px;
        margin: 0;
        padding: 0;
        font-family: Helvetica;
        font-size: 16px;
        line-height: 1.2;
      }

      * {
        margin: 0;
        padding: 0;
      }

      h1 {
        border-style: solid;
        border-width: 6px;
        border-color: red;
        padding: 10px;
        font-size: 16px;
        font-weight: normal;
      }

      p {
        display: block;
        border-style: solid;
        border-width: 6px;
        border-color: blue;
        padding: 10px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Block by default</h1>
    <p>Also block</p>
  </body>
</html>
